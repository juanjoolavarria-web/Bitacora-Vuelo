<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bitácora">
<meta name="theme-color" content="#0B1120">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png">
<title>Bitácora de Vuelo</title>
<link rel="icon" href="icons/icon.svg">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#0B1120;color:#F1F5F9}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#1E293B;border-radius:4px}
input,select,button,textarea{font-family:'DM Sans',sans-serif;outline:none}
input[type="date"]{color-scheme:dark}

/* LOGIN */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;gap:16px}
.login-logo{font-size:60px;margin-bottom:8px}
.login-title{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:800;letter-spacing:4px;color:#F1F5F9}
.login-sub{font-size:12px;color:#64748B;letter-spacing:2px;margin-bottom:8px}
.login-box{background:#131C2E;border-radius:12px;padding:24px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px}
.login-box input{width:100%;padding:12px;background:#0B1120;border:1px solid #1E293B;border-radius:8px;color:#F1F5F9;font-size:15px}
.login-box input::placeholder{color:#475569}
.login-err{color:#EF4444;font-size:12px;text-align:center;min-height:16px}
.login-btn{width:100%;padding:14px;border:none;border-radius:10px;background:#3B82F6;color:#0B1120;font-size:15px;font-weight:800;letter-spacing:2px;cursor:pointer}
.login-btn:disabled{opacity:.5;cursor:default}

.app{max-width:720px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}
.view{flex:1;overflow-y:auto;padding:16px 16px 0;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column}
.view.form-view{padding-bottom:20px;display:block;overflow-y:auto}

.nav{display:flex;justify-content:space-around;background:#0D1424;border-top:1px solid #1E293B;padding:6px 0 max(10px,env(safe-area-inset-bottom));flex-shrink:0;max-width:720px}
.nav-btn{background:none;border:none;border-top:2px solid transparent;color:#475569;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 16px;cursor:pointer;transition:all .15s}
.nav-btn.active{border-top-color:var(--cat-color);color:var(--cat-color)}
.nav-btn .icon{font-size:20px}
.nav-btn .label{font-size:10px;letter-spacing:1px}

.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-top:max(8px,env(safe-area-inset-top));flex-shrink:0}
.title{font-size:22px;font-weight:800;letter-spacing:4px;font-family:'JetBrains Mono',monospace}
.subtitle{font-size:12px;letter-spacing:2px;margin-top:2px;font-weight:700}
.header-btns{display:flex;gap:8px}
.gear-btn{background:none;border:1px solid #1E293B;border-radius:8px;color:#64748B;font-size:18px;padding:6px 10px;cursor:pointer}
.back-btn{background:none;border:none;color:#64748B;font-size:13px;cursor:pointer;padding:4px 0}
.form-title{font-size:15px;font-weight:700;letter-spacing:1px;color:var(--cat-color)}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;flex-shrink:0}
.stat-card{background:#131C2E;border-radius:10px;padding:14px 12px;display:flex;flex-direction:column;gap:4px}
.stat-card.big{grid-column:span 2}
.stat-val{font-family:'JetBrains Mono','SF Mono',monospace;font-weight:800}
.stat-val.big{font-size:32px}
.stat-val.sm{font-size:22px;color:#94A3B8}
.stat-label{font-size:10px;color:#64748B;letter-spacing:1.5px;text-transform:uppercase}
.mini-stat{background:#131C2E;border-radius:8px;padding:6px 12px;display:inline-flex;gap:6px;align-items:center}
.mini-stat .v{font-size:14px;font-weight:700;font-family:monospace}
.mini-stat .l{font-size:9px;color:#64748B;text-transform:uppercase;letter-spacing:1px}

.big-btn{width:100%;padding:14px;border:none;border-radius:10px;color:#0B1120;font-size:15px;font-weight:800;letter-spacing:2px;cursor:pointer;flex-shrink:0}
.big-btn:disabled{background:#334155!important;opacity:.5;cursor:default}
.small-btn{background:none;border:none;color:#64748B;font-size:11px;cursor:pointer;padding:2px 6px}

.lbl{display:block;color:#64748B;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin:12px 0 4px}
.inp{width:100%;padding:10px 12px;background:#131C2E;border:1px solid #1E293B;border-radius:8px;color:#F1F5F9;font-size:14px}
.inp-big{font-size:22px;font-weight:700;text-align:center;letter-spacing:2px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:7px 12px;border-radius:8px;border:1px solid #1E293B;background:#0B1120;color:#94A3B8;font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap;transition:all .1s}
.chip.on{background:var(--cat-color);color:#0B1120;border-color:var(--cat-color)}
.chip.ifr.on{background:#818CF8;color:#0B1120;border-color:#818CF8}
.chip.full{width:100%;padding:10px;text-align:center;margin-top:4px}
.mat-info{color:#64748B;font-size:13px;margin:2px 0 8px}

.section{margin-top:20px}
.section-header{display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.section-title{color:#475569;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:150;padding:16px;animation:fadeIn .15s ease}
.modal{background:#131C2E;border-radius:12px;padding:20px;max-width:300px;width:100%}
.modal p{color:#F1F5F9;font-size:15px;margin-bottom:16px}
.modal-btns{display:flex;gap:10px}
.modal-btn{flex:1;padding:10px;border:none;border-radius:8px;color:#F1F5F9;font-weight:700;font-size:13px;cursor:pointer}

.settings-panel{background:#131C2E;border-radius:16px;padding:20px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto}
.settings-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.settings-head h3{color:#F1F5F9;font-size:16px}
.settings-close{background:none;border:none;color:#64748B;font-size:20px;cursor:pointer}
.settings-desc{color:#64748B;font-size:11px;margin-bottom:16px;line-height:1.5}
.settings-cat{margin-bottom:20px;padding:12px;background:#0B1120;border-radius:8px;border-left:3px solid var(--c)}
.settings-cat h4{font-size:13px;margin:0 0 10px;letter-spacing:1px}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.settings-footer{margin-top:10px;display:flex;justify-content:space-between;align-items:center}
.settings-footer span{color:#475569;font-size:10px}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#10B981;color:#0B1120;padding:10px 20px;border-radius:10px;font-weight:700;font-size:13px;z-index:200;animation:slideUp .3s ease;letter-spacing:.5px;white-space:nowrap}
.empty{color:#64748B;text-align:center;padding:40px}
.loading{color:#64748B;text-align:center;padding:40px;font-size:13px;letter-spacing:1px}

.tbl-section{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;margin-top:8px}
.tbl-wrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid #1E293B;border-radius:8px;overscroll-behavior:contain}
.tbl{width:100%;border-collapse:collapse;min-width:700px;font-size:12px}
.tbl thead{position:sticky;top:0;z-index:2}
.tbl th{background:#131C2E;color:#64748B;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:8px 6px;text-align:left;border-bottom:1px solid #1E293B;white-space:nowrap}
.tbl td{padding:7px 6px;border-bottom:1px solid #0F172A;color:#CBD5E1;white-space:nowrap;vertical-align:middle}
.tbl tr:hover td{background:#131C2E}
.tbl .t-time{color:#F1F5F9;font-weight:700;font-family:'JetBrains Mono',monospace}
.tbl .t-per{font-family:'JetBrains Mono',monospace;font-size:11px}
.tbl .t-tot{font-family:'JetBrains Mono',monospace;font-size:11px;color:#64748B}
.tbl .t-ifr{background:#818CF8;color:#0B1120;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700}
.tbl .t-actions{display:flex;gap:4px}
.tbl .t-actions button{background:none;border:none;color:#475569;font-size:11px;cursor:pointer;padding:2px 4px;border-radius:4px}
.tbl .t-actions button:hover{color:#F1F5F9;background:#1E293B}
.tbl .t-actions .del:hover{color:#EF4444}
.tbl tr.renewal-row td{background:#1a1a0a;border-top:2px solid #F59E0B;border-bottom:2px solid #F59E0B}
.tbl .renewal-badge{background:#F59E0B;color:#0B1120;font-size:10px;padding:3px 10px;border-radius:4px;font-weight:800;letter-spacing:1.5px}

.export-row{display:flex;gap:8px;margin-top:12px;margin-bottom:8px;flex-shrink:0}
.export-btn{flex:1;padding:10px;border:1px solid #1E293B;border-radius:8px;background:#0B1120;color:#94A3B8;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.5px;text-align:center}
.export-btn:active{background:#1E293B}

/* USER BADGE */
.user-badge{font-size:11px;color:#64748B;background:#131C2E;padding:4px 10px;border-radius:6px;border:1px solid #1E293B;cursor:pointer}

@keyframes slideUp{from{transform:translateY(20px) translateX(-50%);opacity:0}to{transform:translateY(0) translateX(-50%);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.hidden{display:none!important}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-logo">✈️</div>
    <div class="login-title">BITÁCORA</div>
    <div class="login-sub">DE VUELO</div>
    <div class="login-box">
      <input type="email" id="loginEmail" placeholder="Correo electrónico" autocomplete="email">
      <input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password">
      <div class="login-err" id="loginErr"></div>
      <button class="login-btn" id="loginBtn" onclick="doLogin()">INGRESAR</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="hidden">
  <div class="app" id="app">
    <div id="homeView" class="view">
      <div class="header">
        <div>
          <h1 class="title">BITÁCORA</h1>
          <p class="subtitle" id="homeSubtitle"></p>
        </div>
        <div class="header-btns">
          <span class="user-badge" id="userBadge" onclick="doLogout()">Salir</span>
          <button class="gear-btn" onclick="openSettings()">⚙</button>
        </div>
      </div>
      <div class="stats-grid" id="homeStats"></div>
      <button class="big-btn" id="newFlightBtn" onclick="openForm()">+ REGISTRAR VUELO</button>
      <div class="export-row">
        <button class="export-btn" onclick="exportExcel()">📊 Excel</button>
        <button class="export-btn" onclick="exportExcelAll()">📑 Completo</button>
        <button class="export-btn" onclick="copyAll()">📋 Copiar</button>
      </div>
      <div class="section tbl-section" id="recentSection">
        <div class="section-header">
          <h3 class="section-title">Vuelos</h3>
        </div>
        <div id="recentList"><div class="loading">Cargando vuelos...</div></div>
      </div>
    </div>

    <div id="formView" class="view form-view hidden">
      <div class="header" style="margin-bottom:8px">
        <button class="back-btn" onclick="closeForm()">← Volver</button>
        <h2 class="form-title" id="formTitle"></h2>
      </div>
      <div id="formContent"></div>
    </div>

    <nav class="nav" id="mainNav"></nav>
  </div>
</div>

<div id="overlayContainer"></div>
<div id="toastContainer"></div>

<script type="module">
// ─── FIREBASE CONFIG ─────────────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB69mOwNl1O_lcFZWbTOMM7lZAlfQzTfXg",
  authDomain: "bitacora-vuelos.firebaseapp.com",
  projectId: "bitacora-vuelos",
  storageBucket: "bitacora-vuelos.firebasestorage.app",
  messagingSenderId: "178726391443",
  appId: "1:178726391443:web:b7fc81484b61927e258766",
  measurementId: "G-9SC35NVNKT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ─── ADMIN UID — pon aquí tu UID después del primer login ────────
const ADMIN_UID = "y8658moBgnRtgOMtvMix1H9fLy22";

// ─── CONFIG ─────────────────────────────────────────────────────
const CATS = {
  Planeador: {
    icon: "✈", color: "#3B82F6",
    models: [
      { tipo:"Planeador", modelo:"Duo Discus", mats:["CC-AAW"] },
      { tipo:"Planeador", modelo:"Blanik", mats:["CC-AMW","CC-ASG","CC-KWN","CC-K11W"] },
      { tipo:"Planeador", modelo:"Arcus", mats:["CC-AIG"] },
      { tipo:"Planeador", modelo:"DG1000", mats:["CC-ASZ"] },
      { tipo:"Planeador", modelo:"Pilatus", mats:["CC-K14W"] },
    ],
    airports: ["SCLC","SCHC","LOCAL"],
    labels: { desde:"Desde", hacia:"Hacia", notas:"Observaciones" },
    hasIFR: false
  },
  Helicoptero: {
    icon: "🚁", color: "#10B981",
    models: [
      { tipo:"Helicoptero", modelo:"B407", mats:["CC-ACC"] },
      { tipo:"Helicoptero", modelo:"R44", mats:["CC-CBV"] },
    ],
    airports: ["SCLC","LOCAL","SCHG","SCPC","SCVI","OLIVAR","SCIF","SCCH","SCGO","SCTB","SCOV","SHFY"],
    labels: { desde:"Procedencia", hacia:"Destino", notas:"Observaciones" },
    hasIFR: false
  },
  Avion: {
    icon: "🛩", color: "#F59E0B",
    models: [
      { tipo:"Cessna", modelo:"206", mats:["CC-AQR"] },
      { tipo:"TBM", modelo:"850", mats:["N850GS"] },
      { tipo:"Aviat", modelo:"Husky", mats:["CC-DEK"] },
      { tipo:"Piper", modelo:"PA18", mats:["CC-KWC","CC-KWI"] },
      { tipo:"Aeronka", modelo:"Champion", mats:["CC-PFR"] },
    ],
    airports: ["SCLC","LOCAL","SCTB","SCPC","SCVI","SCHG","SCCH","SCIE","SCPF","SCPG","SCGF","SCBA","SCSN"],
    labels: { desde:"Desde", hacia:"Hacia", notas:"Notas" },
    hasIFR: true
  }
};

const DEFAULT_SETTINGS = {
  Planeador: { horasPrevias:507.85 },
  Helicoptero: { horasPrevias:65.8 },
  Avion: { horasPrevias:366.4, ifrBase:0 }
};

// ─── STATE ──────────────────────────────────────────────────────
let entries = [];
let settings = { ...DEFAULT_SETTINGS };
let activeCat = "Avion";
let editingId = null;
let currentUser = null;
let unsubscribeSnapshot = null;

const fh = h => h == null ? "—" : Number(h).toFixed(1);
const fd = d => { if(!d) return ""; const dt=new Date(d+"T12:00:00"); return dt.toLocaleDateString("es-CL",{day:"2-digit",month:"short",year:"2-digit"}); };
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

// ─── AUTH ────────────────────────────────────────────────────────
window.doLogin = async () => {
  const email = document.getElementById("loginEmail").value.trim();
  const pass = document.getElementById("loginPass").value;
  const btn = document.getElementById("loginBtn");
  const err = document.getElementById("loginErr");
  if(!email || !pass) { err.textContent = "Completa todos los campos"; return; }
  btn.disabled = true;
  err.textContent = "";
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    err.textContent = "Correo o contraseña incorrectos";
    btn.disabled = false;
  }
};

window.doLogout = async () => {
  if(!confirm("¿Cerrar sesión?")) return;
  if(unsubscribeSnapshot) unsubscribeSnapshot();
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  if(user) {
    currentUser = user;
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("appScreen").classList.remove("hidden");
    document.getElementById("userBadge").textContent = user.email.split("@")[0] + " · Salir";
    loadSettings();
    subscribeEntries();
  } else {
    currentUser = null;
    document.getElementById("loginScreen").classList.remove("hidden");
    document.getElementById("appScreen").classList.add("hidden");
    document.getElementById("loginBtn").disabled = false;
    entries = [];
  }
});

// ─── FIRESTORE ───────────────────────────────────────────────────
function userCol() {
  return collection(db, "users", currentUser.uid, "flights");
}

function subscribeEntries() {
  if(unsubscribeSnapshot) unsubscribeSnapshot();
  const q = query(userCol(), orderBy("fecha", "asc"));
  unsubscribeSnapshot = onSnapshot(q, snap => {
    entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    loadSettings();
    showHome();
  }, err => {
    console.error(err);
    toast("Error al cargar vuelos");
  });
}

async function saveFlight(entry) {
  await setDoc(doc(db, "users", currentUser.uid, "flights", entry.id), entry);
}

async function deleteFlight(id) {
  await deleteDoc(doc(db, "users", currentUser.uid, "flights", id));
}

// ─── SETTINGS (localStorage por usuario) ─────────────────────────
function settingsKey() { return `flb_settings_${currentUser?.uid}`; }
function loadSettings() {
  const s = localStorage.getItem(settingsKey());
  settings = s ? { ...DEFAULT_SETTINGS, ...JSON.parse(s) } : { ...DEFAULT_SETTINGS };
}
function saveSettings_() { localStorage.setItem(settingsKey(), JSON.stringify(settings)); }

// ─── UTILS ───────────────────────────────────────────────────────
function catEntries(cat) {
  return entries.filter(e => e.category === cat).sort((a,b) => {
    if(a.fecha !== b.fecha) return a.fecha.localeCompare(b.fecha);
    if(a.renewal && !b.renewal) return -1;
    if(!a.renewal && b.renewal) return 1;
    return 0;
  });
}

function computeTotals(cat) {
  const sorted = catEntries(cat), base = settings[cat];
  let periodo = 0, totales = base.horasPrevias||0, ifr = base.ifrBase||0;
  for(const e of sorted) {
    if(e.renewal) { periodo = 0; continue; }
    totales += e.tiempo||0; periodo += e.tiempo||0;
    if(e.isIFR) ifr += e.tiempo||0;
  }
  return { periodo, totales, ifr, count: sorted.filter(e=>!e.renewal).length };
}

function getEntryTotals(cat, id) {
  const sorted = catEntries(cat), base = settings[cat];
  let periodo = 0, totales = base.horasPrevias||0, ifr = base.ifrBase||0;
  for(const e of sorted) {
    if(e.renewal) { periodo = 0; if(e.id === id) break; continue; }
    totales += e.tiempo||0; periodo += e.tiempo||0;
    if(e.isIFR) ifr += e.tiempo||0;
    if(e.id === id) break;
  }
  return { periodo, totales, ifr };
}

// ─── TOAST ───────────────────────────────────────────────────────
function toast(msg, color="#10B981") {
  const c = document.getElementById("toastContainer");
  c.innerHTML = `<div class="toast" style="background:${color}">${msg}</div>`;
  setTimeout(() => c.innerHTML = "", 2500);
}

// ─── NAV ─────────────────────────────────────────────────────────
function renderNav() {
  document.getElementById("mainNav").innerHTML = Object.entries(CATS).map(([cat, cfg]) =>
    `<button class="nav-btn ${activeCat===cat?'active':''}" style="--cat-color:${cfg.color}" onclick="window._switchCat('${cat}')">
      <span class="icon">${cfg.icon}</span><span class="label">${cat.toUpperCase()}</span>
    </button>`
  ).join("");
}
window._switchCat = cat => { activeCat = cat; showHome(); };

// ─── HOME ─────────────────────────────────────────────────────────
function showHome() {
  document.getElementById("homeView").classList.remove("hidden");
  document.getElementById("formView").classList.add("hidden");
  document.getElementById("mainNav").classList.remove("hidden");

  const cfg = CATS[activeCat], totals = computeTotals(activeCat);
  document.documentElement.style.setProperty("--cat-color", cfg.color);
  document.getElementById("homeSubtitle").textContent = `${cfg.icon} ${activeCat.toUpperCase()}`;
  document.getElementById("homeSubtitle").style.color = cfg.color;
  document.getElementById("newFlightBtn").style.background = cfg.color;

  let statsHTML = `
    <div class="stat-card big"><span class="stat-val big" style="color:${cfg.color}">${fh(totals.periodo)}</span><span class="stat-label">Hrs Periodo</span></div>
    <div class="stat-card"><span class="stat-val sm">${fh(totals.totales)}</span><span class="stat-label">Hrs Totales</span></div>
    <div class="stat-card"><span class="stat-val sm">${totals.count}</span><span class="stat-label">Vuelos</span></div>`;
  if(activeCat==="Avion") statsHTML += `<div class="stat-card"><span class="stat-val sm" style="color:#818CF8">${fh(totals.ifr)}</span><span class="stat-label">Hrs IFR</span></div>`;
  document.getElementById("homeStats").innerHTML = statsHTML;

  const all = [...catEntries(activeCat)].reverse();
  const sect = document.getElementById("recentSection");
  sect.classList.toggle("hidden", all.length === 0);
  document.getElementById("recentList").innerHTML = all.length ? buildTable(all, activeCat) : '';
  renderNav();
}

// ─── TABLE ────────────────────────────────────────────────────────
function buildTable(flights, cat) {
  const cfg = CATS[cat], hasIFR = cfg.hasIFR, cols = hasIFR ? 12 : 11;
  let html = `<div class="tbl-wrap"><table class="tbl"><thead><tr>
    <th>Fecha</th><th>Tipo</th><th>Modelo</th><th>Matrícula</th>
    <th>${cfg.labels.desde}</th><th>${cfg.labels.hacia}</th>
    <th>Tiempo</th><th>Periodo</th><th>Totales</th>
    <th>${cfg.labels.notas}</th>${hasIFR?'<th>IFR</th>':''}
    <th></th></tr></thead><tbody>`;
  for(const e of flights) {
    if(e.renewal) {
      html += `<tr class="renewal-row"><td colspan="${cols}" style="text-align:center;padding:8px">
        <span class="renewal-badge">RENOVACIÓN — ${e.renewalLabel||fd(e.fecha)}</span></td></tr>`;
      continue;
    }
    const t = getEntryTotals(cat, e.id);
    html += `<tr>
      <td>${fd(e.fecha)}</td><td>${e.tipo}</td><td>${e.modelo}</td><td>${e.matricula}</td>
      <td>${e.desde}</td><td>${e.hacia}</td>
      <td class="t-time">${fh(e.tiempo)}</td>
      <td class="t-per" style="color:${cfg.color}">${fh(t.periodo)}</td>
      <td class="t-tot">${fh(t.totales)}</td>
      <td style="color:#64748B;max-width:120px;overflow:hidden;text-overflow:ellipsis">${e.notas||""}</td>
      ${hasIFR?`<td>${e.isIFR?'<span class="t-ifr">IFR</span>':''}</td>`:''}
      <td><div class="t-actions">
        <button onclick="window._editEntry('${e.id}')">✏️</button>
        <button class="del" onclick="window._confirmDel('${e.id}')">🗑</button>
      </div></td></tr>`;
  }
  return html + '</tbody></table></div>';
}

// ─── FORM ─────────────────────────────────────────────────────────
let formState = {};

window.openForm = function(id) {
  editingId = id || null;
  document.getElementById("homeView").classList.add("hidden");
  document.getElementById("formView").classList.remove("hidden");
  document.getElementById("mainNav").classList.add("hidden");

  const cfg = CATS[activeCat];
  const entry = id ? entries.find(e => e.id === id) : null;
  document.getElementById("formTitle").textContent = (entry?"Editar":"Nuevo") + ` Vuelo — ${activeCat}`;

  let mIdx = 0, matIdx = 0;
  if(entry) {
    mIdx = cfg.models.findIndex(m => m.tipo===entry.tipo && m.modelo===entry.modelo);
    if(mIdx<0) mIdx=0;
    matIdx = cfg.models[mIdx].mats.indexOf(entry.matricula);
    if(matIdx<0) matIdx=0;
  }
  formState = {
    modelIdx: mIdx, matIdx,
    fecha: entry ? entry.fecha : new Date().toISOString().split("T")[0],
    desde: entry ? entry.desde : cfg.airports[0],
    hacia: entry ? entry.hacia : (cfg.airports.includes("LOCAL")?"LOCAL":cfg.airports[1]||""),
    tiempo: entry ? String(entry.tiempo) : "",
    notas: entry ? (entry.notas||"") : "",
    isIFR: entry ? (entry.isIFR||false) : false,
    customDesde: "", customHacia: ""
  };
  if(entry && !cfg.airports.includes(entry.desde)) { formState.desde="_custom"; formState.customDesde=entry.desde; }
  if(entry && !cfg.airports.includes(entry.hacia)) { formState.hacia="_custom"; formState.customHacia=entry.hacia; }
  renderForm();
};

function renderForm() {
  const cfg = CATS[activeCat], m = cfg.models[formState.modelIdx], mats = m.mats;
  const aopts = a => cfg.airports.map(ap=>`<option value="${ap}" ${a===ap?"selected":""}>${ap}</option>`).join("")+`<option value="_custom" ${a==="_custom"?"selected":""}>Otro...</option>`;

  let html = `
    <label class="lbl">Fecha</label>
    <input type="date" class="inp" value="${formState.fecha}" onchange="formState.fecha=this.value">
    <label class="lbl">Aeronave</label>
    <div class="chips">${cfg.models.map((mod,i)=>`<button class="chip ${formState.modelIdx===i?'on':''}" style="--cat-color:${cfg.color}" onclick="window._setModel(${i})">${mod.tipo} ${mod.modelo}</button>`).join("")}</div>`;

  if(mats.length>1) html += `<label class="lbl">Matrícula</label><div class="chips">${mats.map((mt,i)=>`<button class="chip ${formState.matIdx===i?'on':''}" style="--cat-color:${cfg.color}" onclick="formState.matIdx=${i};renderForm()">${mt}</button>`).join("")}</div>`;
  else html += `<p class="mat-info">Matrícula: ${mats[0]}</p>`;

  html += `<div class="row2">
    <div><label class="lbl">${cfg.labels.desde}</label>
    <select class="inp" onchange="formState.desde=this.value;renderForm()">${aopts(formState.desde)}</select>
    ${formState.desde==="_custom"?`<input class="inp" style="margin-top:4px" placeholder="ICAO" value="${formState.customDesde}" oninput="formState.customDesde=this.value">`:""}
    </div>
    <div><label class="lbl">${cfg.labels.hacia}</label>
    <select class="inp" onchange="formState.hacia=this.value;renderForm()">${aopts(formState.hacia)}</select>
    ${formState.hacia==="_custom"?`<input class="inp" style="margin-top:4px" placeholder="ICAO" value="${formState.customHacia}" oninput="formState.customHacia=this.value">`:""}
    </div></div>
    <label class="lbl">Tiempo de Vuelo (hrs)</label>
    <input type="number" step="0.1" min="0" inputmode="decimal" class="inp inp-big" value="${formState.tiempo}" oninput="formState.tiempo=this.value" placeholder="ej: 1.5">`;

  if(cfg.hasIFR) html += `<button class="chip full ${formState.isIFR?'ifr on':''}" onclick="formState.isIFR=!formState.isIFR;renderForm()">${formState.isIFR?"✓ Vuelo IFR":"Marcar como IFR"}</button>`;

  html += `<label class="lbl">${cfg.labels.notas}</label>
    <input class="inp" placeholder="Opcional" value="${formState.notas}" oninput="formState.notas=this.value">
    <button class="big-btn" style="margin-top:16px;background:${cfg.color}" onclick="window._submitForm()" ${!formState.tiempo?"disabled":""}>${editingId?"ACTUALIZAR":"GUARDAR VUELO"}</button>`;

  document.getElementById("formContent").innerHTML = html;
}

window._setModel = i => { formState.modelIdx=i; formState.matIdx=0; renderForm(); };
window.renderForm = renderForm;

window._submitForm = async function() {
  const t = parseFloat(formState.tiempo);
  if(!t||t<=0) return;
  const cfg = CATS[activeCat], m = cfg.models[formState.modelIdx];
  const entry = {
    category: activeCat, tipo: m.tipo, modelo: m.modelo,
    matricula: m.mats[formState.matIdx]||m.mats[0]||"",
    fecha: formState.fecha,
    desde: formState.desde==="_custom"?formState.customDesde.toUpperCase():formState.desde,
    hacia: formState.hacia==="_custom"?formState.customHacia.toUpperCase():formState.hacia,
    tiempo: t, notas: formState.notas, isIFR: formState.isIFR,
    id: editingId || uid()
  };
  try {
    await saveFlight(entry);
    const wasEditing = editingId;
    editingId = null;
    closeForm();
    toast(wasEditing?"Vuelo actualizado ✓":"Vuelo registrado ✓");
  } catch(e) {
    toast("Error al guardar", "#EF4444");
  }
};

window.closeForm = function() { editingId=null; showHome(); };
window._editEntry = id => window.openForm(id);

window._confirmDel = id => {
  document.getElementById("overlayContainer").innerHTML = `
    <div class="overlay" onclick="closeOverlay()">
      <div class="modal" onclick="event.stopPropagation()">
        <p>¿Eliminar este registro?</p>
        <div class="modal-btns">
          <button class="modal-btn" style="background:#1E293B" onclick="closeOverlay()">Cancelar</button>
          <button class="modal-btn" style="background:#EF4444" onclick="window._delEntry('${id}')">Eliminar</button>
        </div>
      </div>
    </div>`;
};

window._delEntry = async id => {
  try {
    await deleteFlight(id);
    closeOverlay(); toast("Registro eliminado");
  } catch(e) { toast("Error al eliminar","#EF4444"); }
};

window.closeOverlay = () => document.getElementById("overlayContainer").innerHTML = "";

// ─── SETTINGS ────────────────────────────────────────────────────
window.openSettings = function() {
  let tmp = JSON.parse(JSON.stringify(settings));
  let html = `<div class="overlay" onclick="closeOverlay()"><div class="settings-panel" onclick="event.stopPropagation()">
    <div class="settings-head"><h3>Configuración</h3><button class="settings-close" onclick="closeOverlay()">✕</button></div>
    <p class="settings-desc">Horas previas al inicio del periodo actual.</p>`;
  for(const [cat,cfg] of Object.entries(CATS)) {
    const totals = computeTotals(cat);
    html += `<div class="settings-cat" style="--c:${cfg.color}">
      <h4 style="color:${cfg.color}">${cfg.icon} ${cat.toUpperCase()}</h4>
      <div class="settings-grid">
        <div><label class="lbl" style="font-size:10px;margin-top:0">Hrs Previas</label>
        <input class="inp" style="font-size:13px" type="number" step="0.1" value="${tmp[cat].horasPrevias}" data-cat="${cat}" data-key="horasPrevias"></div>
        ${cat==="Avion"?`<div><label class="lbl" style="font-size:10px;margin-top:0">Hrs Base IFR</label>
        <input class="inp" style="font-size:13px" type="number" step="0.1" value="${tmp[cat].ifrBase||0}" data-cat="${cat}" data-key="ifrBase"></div>`:""}
      </div>
      <div class="settings-footer">
        <span>Periodo: ${fh(totals.periodo)}h · Total: ${fh(totals.totales)}h</span>
        <button class="small-btn" style="color:#F59E0B;font-size:10px" onclick="window._resetPeriod('${cat}')">Renovar Periodo</button>
      </div>
    </div>`;
  }
  html += `<button class="big-btn" style="background:#3B82F6;font-size:14px;margin-top:4px" onclick="window._saveSettings()">GUARDAR</button></div></div>`;
  document.getElementById("overlayContainer").innerHTML = html;

  window._saveSettings = () => {
    document.querySelectorAll(".settings-panel input[data-cat]").forEach(inp => {
      tmp[inp.dataset.cat][inp.dataset.key] = parseFloat(inp.value)||0;
    });
    settings = tmp; saveSettings_(); closeOverlay(); showHome(); toast("Configuración guardada");
  };

  window._resetPeriod = async cat => {
    if(!confirm(`¿Renovar periodo de ${cat}?`)) return;
    const today = new Date().toISOString().split("T")[0];
    const renewal = { id:'ren_'+cat+'_'+today, category:cat, tipo:'', modelo:'', matricula:'',
      fecha:today, desde:'', hacia:'', tiempo:0, notas:'', isIFR:false, renewal:true };
    await saveFlight(renewal);
    closeOverlay(); toast(`Periodo ${cat} renovado`);
  };
};

// ─── EXPORT ──────────────────────────────────────────────────────
function buildSheetData(cat) {
  const cfg=CATS[cat], base=settings[cat], hasIFR=cfg.hasIFR;
  const rows=[["",cat==="Planeador"?"Bitacora Planeador":cat==="Helicoptero"?"Bitacora Helicoptero":"Bitacora Avion"],
    ["","Tomas Lyon Valdivieso"],["","15.382.016-3"],["",""],["",""],
    ["","Horas Previas",base.horasPrevias],[]];
  const h=["","Fecha","Tipo","Modelo","Matricula",cfg.labels.desde,cfg.labels.hacia,"Tiempo","Periodo","Totales",cfg.labels.notas];
  if(hasIFR) h.push("Hrs IFR");
  rows.push(h);
  let periodo=0,totales=base.horasPrevias||0,ifr=base.ifrBase||0;
  for(const e of catEntries(cat)) {
    if(e.renewal){rows.push(["","","","","","","","","RENOVACIÓN","",""]);periodo=0;continue;}
    totales+=e.tiempo||0;periodo+=e.tiempo||0;if(e.isIFR)ifr+=e.tiempo||0;
    const r=["",e.fecha,e.tipo,e.modelo,e.matricula,e.desde,e.hacia,e.tiempo,periodo,totales,e.notas||""];
    if(hasIFR)r.push(e.isIFR?ifr:"");
    rows.push(r);
  }
  return rows;
}

window.exportExcel = function() {
  if(!catEntries(activeCat).length){toast("Sin datos","#F59E0B");return;}
  const wb=XLSX.utils.book_new(), ws=XLSX.utils.aoa_to_sheet(buildSheetData(activeCat));
  ws['!cols']=[{wch:2},{wch:12},{wch:12},{wch:12},{wch:10},{wch:10},{wch:14},{wch:8},{wch:8},{wch:10},{wch:18},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws,activeCat);
  XLSX.writeFile(wb,`bitacora_${activeCat.toLowerCase()}_${new Date().toISOString().split("T")[0]}.xlsx`);
  toast("Excel descargado");
};

window.exportExcelAll = function() {
  const wb=XLSX.utils.book_new(); let hasData=false;
  for(const cat of ["Planeador","Helicoptero","Avion"]) {
    if(!catEntries(cat).length) continue; hasData=true;
    const ws=XLSX.utils.aoa_to_sheet(buildSheetData(cat));
    ws['!cols']=[{wch:2},{wch:12},{wch:12},{wch:12},{wch:10},{wch:10},{wch:14},{wch:8},{wch:8},{wch:10},{wch:18},{wch:8}];
    XLSX.utils.book_append_sheet(wb,ws,cat);
  }
  if(!hasData){toast("Sin datos","#F59E0B");return;}
  XLSX.writeFile(wb,`bitacora_completa_${new Date().toISOString().split("T")[0]}.xlsx`);
  toast("Excel completo descargado");
};

window.copyAll = function() {
  const sorted=catEntries(activeCat); if(!sorted.length){toast("Sin datos","#F59E0B");return;}
  let txt=`BITÁCORA ${activeCat.toUpperCase()}\n${"═".repeat(40)}\n`;
  sorted.forEach(e=>{const t=getEntryTotals(activeCat,e.id);txt+=`${e.fecha}|${e.tipo} ${e.modelo} ${e.matricula}|${e.desde}→${e.hacia}|${fh(e.tiempo)}h|Per:${fh(t.periodo)} Tot:${fh(t.totales)}${e.isIFR?" IFR":""}${e.notas?" |"+e.notas:""}\n`;});
  navigator.clipboard.writeText(txt).then(()=>toast("Copiado"));
};

// ─── SERVICE WORKER ───────────────────────────────────────────────
if("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("/Bitacora-Vuelo/sw.js"));
}
